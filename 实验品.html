<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻页照片墙</title>

<style>
body {
    margin: 0;
    background: #f0f0f0;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    padding: 20px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* 卡片容器 */
/* .card {
    perspective: 1000px;
    cursor: pointer;
} */

/* 卡片内部 */
.card-inner {
    position: relative;
    width: 100%;
    height: 260px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

/* 翻转状态 */
.card.flipped .card-inner {
    transform: rotateY(180deg) scale(1.1);
    z-index: 2;
}

/* 正反面通用 */
.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* 正面 */
.card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 背面 */
.card-back {
    background: white;
    transform: rotateY(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    text-align: center;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>📸 我的回忆照片墙</h1>

<div class="gallery">

    <div class="card" onclick="flipCard(this)">
        <div class="card-inner">
            <div class="card-front">
                <img src="https://picsum.photos/400?1">
            </div>
            <div class="card-back">
                这是我们第一次旅行 🌍
            </div>
        </div>
    </div>

    <div class="card" onclick="flipCard(this)">
        <div class="card-inner">
            <div class="card-front">
                <img src="C:\Users\邱郁萱\Desktop\照片\原神\mmexport5b2ebbecbe75a9733af4613fb4621785_1731141501384.webp" width="500px" height="200px">
            </div>
            <div class="card-back">
                那天的夕阳真的很美 🌅
            </div>
        </div>
    </div>

    <div class="card" onclick="flipCard(this)">
        <div class="card-inner">
            <div class="card-front">
                <img src="https://picsum.photos/400?3">
            </div>
            <div class="card-back">
                一起吃过最幸福的一顿饭 🍜
            </div>
        </div>
    </div>

</div>

<script>
function flipCard(card){
    card.classList.toggle("flipped");
}
</script>

</body>
</html>
