<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>

    <style>

    body{
        font-family:Arial;
        background-image: url(https://seogc.fp.ps.netease.com/file/684a7fcafc0dab91dc717d2dSTKgARPU06?fop=imageView%2F2%2Fw%2F600%2Ff%2Fjpeg%2Fq%2F60);
        background-size: cover;
        display:flex;
        flex-direction:column;
        align-items:center;
        margin-top:10px;
        padding: 0px 0;
        /* height: 300px; */
    }

    h1{
        font-size:60px;
        margin:10px;
        color:#76c6ff;
    }

    .scorebox{
        display:flex;
        gap:10px;
        margin-bottom:10px;
    }

    .score{
        background:#84d6f1;
        padding:10px 20px;
        border-radius:5px;
        color:white;
        text-align:center;
    }

    #board{
        display:grid;
        grid-template-columns:repeat(4,100px);
        grid-gap:10px;
        background:#93a6a7;
        padding:10px;
        border-radius:8px;
        transition: 3s;
    }

    .tile{
        width:100px;
        height:100px;
        background:#cdc1b4;
        border-radius:5px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:35px;
        font-weight:bold;
        color:#776e65;
    }

    button{
        margin-top:15px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        background:#8f7a66;
        color:white;
        border-radius:5px;
        cursor:pointer;
    }
    @keyframes slide{
       
    }

    </style>
</head>

<body>

    <h1>2048</h1>

    <div class="scorebox">
        <div class="score">分数<br><span id="score">0</span></div>
        <div class="score">最高分<br><span id="best">0</span></div>
    </div>

    <div id="board"></div>

    <button onclick="startGame()">重新开始</button>

    <p>使用键盘方向键 或 手机滑动</p>

    <script>

        const size=4
        let board=[]
        let score=0

        const colors={
            2:"#eee4da",
            4:"#ede0c8",
            8:"#f2b179",
            16:"#f59563",
            32:"#f67c5f",
            64:"#f65e3b",
            128:"#edcf72",
            256:"#edcc61",
            512:"#edc850",
            1024:"#edc53f",
            2048:"#edc22e"
        }

        function startGame(){

            board=[]
            score=0

            for(let i=0;i<size;i++){
            board[i]=[]
            for(let j=0;j<size;j++) board[i][j]=0
            }

            addRandom()
            addRandom()

            updateScore()
            draw()

        }

        function addRandom(){

            let empty=[]

            for(let r=0;r<size;r++)
            for(let c=0;c<size;c++)
            if(board[r][c]==0) empty.push([r,c])

            if(empty.length==0) return

            let [r,c]=empty[Math.floor(Math.random()*empty.length)]

            board[r][c]=Math.random()<0.9?2:4

        }

        function draw(){

            const b=document.getElementById("board")
            b.innerHTML=""

            board.flat().forEach(v=>{

            let d=document.createElement("div")
            d.className="tile"
            d.textContent=v?v:""


            if(colors[v]) d.style.background=colors[v]

            if(v>=8) d.style.color="white"

            b.appendChild(d)

            })

        }

        function slide(row){

            row=row.filter(v=>v)

            for(let i=0;i<row.length-1;i++){

            if(row[i]==row[i+1]){

            row[i]*=2
            score+=row[i]
            row[i+1]=0

            }

            }

            row=row.filter(v=>v)

            while(row.length<size) row.push(0)

            return row

        }

        function rotate(b){

            let n=[]

            for(let i=0;i<size;i++) n[i]=Array(size).fill(0)

            for(let r=0;r<size;r++)
            for(let c=0;c<size;c++)
            n[c][size-1-r]=b[r][c]

            return n

        }

        function moveLeft(){

            board=board.map(r=>slide(r))

        }

        function move(dir){

            let r={
                left:0,
                up:1,
                right:2,
                down:3
            }[dir]

            for(let i=0;i<r;i++) board=rotate(board)
            
            moveLeft()

            for(let i=0;i<(4-r)%4;i++) board=rotate(board)

            addRandom()

            updateScore()
            draw()

        }

        function updateScore(){

            document.getElementById("score").textContent=score

            let best=localStorage.getItem("best2048")||0

            if(score>best){

            best=score
            localStorage.setItem("best2048",best)

        }

        document.getElementById("best").textContent=best

        }

        window.addEventListener("keydown",e=>{

            if(e.key==="ArrowLeft") move("left")
            if(e.key==="ArrowRight") move("right")
            if(e.key==="ArrowUp") move("down")
            if(e.key==="ArrowDown") move("up")

        })

        let startX,startY

        document.addEventListener("touchstart",e=>{
            startX=e.touches[0].clientX
            startY=e.touches[0].clientY
        })

        document.addEventListener("touchend",e=>{

            let dx=e.changedTouches[0].clientX-startX
            let dy=e.changedTouches[0].clientY-startY

            if(Math.abs(dx)>Math.abs(dy)){

            if(dx>0) move("right")
            else move("left")

            }else{

            if(dy>0) move("down")
            else move("up")

            }

        })

        startGame()

    </script>

</body>
</html>
